<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Calculadora</title>
    <link rel="stylesheet" href="../main.css">
</head>
<body>
    
    <section class="main">

    <h1>Calculadora</h1>
   
    <div class="contenido">  
    <div class="display">
    <div class="valor-arriba" data-valor-superior></div>
    <div class="valor-medio" data-valor-medio></div>
    <div class="valor-abajo" data-valor-inferior></div>
    </div>
    <button class="botones" data-encendido>ON</button>
    <button id="eliminar" data-eliminar-todo>C</button>
    <button id="borrar" data-borrar>DEL</button>
    <button class="ejecutor"data-ejecutor>%</button>
    <button class="botones"data-botones>7</button>
    <button class="botones"data-botones>8</button>
    <button class="botones"data-botones>9</button>
    <button class="ejecutor"data-ejecutor>/</button>
    <button class="botones"data-botones>4</button>
    <button class="botones"data-botones>5</button>
    <button class="botones"data-botones>6</button>
    <button class="ejecutor"data-ejecutor>*</button>
    <button class="botones"data-botones>1</button>
    <button class="botones"data-botones>2</button>
    <button class="botones"data-botones>3</button>
    <button class="ejecutor"data-ejecutor>-</button>
    <button class="botones"data-botones>0</button>
    <button class="botones"data-botones>.</button>
    <button id="igual" data-igual>=</button>
    <button class="ejecutor"data-ejecutor>+</button>
</div>
</div>
</section>
<script src="main.js" defer></script>
</body>
</html>
